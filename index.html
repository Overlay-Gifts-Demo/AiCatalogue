<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>10 Button UI</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
}

/* top display */

#display{
    height:60vh;
    border-bottom:2px solid gold;
}

/* iframe */

#display iframe{
    width:100%;
    height:100%;
    border:none;
}

/* grid area */

.gridBox{
    padding:20px;
    display:flex;
    justify-content:center;
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(5,80px);
    gap:15px;
    border:3px solid gold;
    padding:15px;
    border-radius:20px;
}

/* buttons */

button{
    height:60px;
    border-radius:15px;
    border:none;
    background:#333;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:gold;
    color:black;
}

</style>
</head>



<body>


<div id="display"></div>



<div class="gridBox">

<div class="grid">

<button onclick="openUI('ui1.html')">1</button>
<button onclick="openUI('ui2.html')">2</button>
<button onclick="openUI('ui3.html')">3</button>
<button onclick="openUI('ui4.html')">4</button>
<button onclick="openUI('ui5.html')">5</button>

<button onclick="openUI('ui6.html')">6</button>
<button onclick="openUI('ui7.html')">7</button>
<button onclick="openUI('ui8.html')">8</button>
<button onclick="openUI('ui9.html')">9</button>
<button onclick="openUI('ui10.html')">10</button>

</div>

</div>



<script>

function openUI(page){

document.getElementById("display").innerHTML =
'<iframe src="'+page+'"></iframe>';

}

</script>


</body>
</html>
