<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creative 10 Button UI</title>

<style>

body {
    margin: 0;
    background: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

/* center circle */

.menu {
    position: relative;
    width: 300px;
    height: 300px;
}

/* center button */

.center {
    position: absolute;
    width: 80px;
    height: 80px;
    background: gold;
    border-radius: 50%;
    top: 110px;
    left: 110px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* buttons */

.btn {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #222;
    border-radius: 50%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    border: 2px solid gold;
}

/* positions */

.b1 { top: 0; left: 120px; }
.b2 { top: 30px; right: 20px; }
.b3 { top: 100px; right: 0; }
.b4 { bottom: 30px; right: 20px; }
.b5 { bottom: 0; left: 120px; }

.b6 { bottom: 30px; left: 20px; }
.b7 { top: 100px; left: 0; }
.b8 { top: 30px; left: 20px; }

.b9 { top: 180px; left: 40px; }
.b10 { top: 180px; right: 40px; }

</style>
</head>


<body>

<div class="menu">

<div class="center">MENU</div>

<div class="btn b1">1</div>
<div class="btn b2">2</div>
<div class="btn b3">3</div>
<div class="btn b4">4</div>
<div class="btn b5">5</div>
<div class="btn b6">6</div>
<div class="btn b7">7</div>
<div class="btn b8">8</div>
<div class="btn b9">9</div>
<div class="btn b10">10</div>

</div>

</body>
</html>
