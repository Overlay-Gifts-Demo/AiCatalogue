<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bottom Dock UI</title>

<style>

body{
    margin:0;
    background:black;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
}

/* Camera area */

.camera{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:70px;
    background:#111;
}

/* bottom dock */

.dock{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:#222;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:2px solid gold;
}

/* dock buttons */

.dock button{
    width:50px;
    height:50px;
    border-radius:50%;
    border:none;
    background:#333;
    color:white;
    font-size:18px;
}

/* popup */

.popup{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    padding:10px;
    display:none;
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.grid button{
    height:50px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:16px;
}

</style>
</head>


<body>


<div class="camera"></div>


<div class="popup" id="popup">

<div class="grid">

<button>1</button>
<button>2</button>
<button>3</button>
<button>4</button>
<button>5</button>

<button>6</button>
<button>7</button>
<button>8</button>
<button>9</button>
<button>10</button>

</div>

</div>



<div class="dock">

<button onclick="toggle()">☰</button>
<button>R</button>
<button>C</button>
<button>B</button>
<button>S</button>

</div>



<script>

function toggle(){

let p = document.getElementById("popup");

if(p.style.display=="block"){
p.style.display="none";
}else{
p.style.display="block";
}

}

</script>


</body>
</html>
