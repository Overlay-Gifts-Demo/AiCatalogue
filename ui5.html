<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | Prism UI Fixed</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --prism-gold: #FFD700;
      --deep-void: #000;
    }

    body, html {
      margin: 0; padding: 0;
      background: var(--deep-void);
      color: white; font-family: sans-serif;
      overflow: hidden; height: 100vh;
    }

    /* Video Background - Kept at Z-0 */
    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* SIDE NAVIGATION */
    #dock {
      position: fixed; right: 20px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 12px; z-index: 100; /* High z-index to stay on top */
    }

    .cat {
      width: 65px; height: 65px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11px; font-weight: bold;
      text-transform: uppercase; color: #fff;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }

    .cat.active {
      background: var(--prism-gold);
      color: #000;
      transform: scale(1.1) translateX(-5px);
    }

    /* JEWELRY CONTAINER - The fix is here */
    #jewelry-options {
      position: fixed; 
      bottom: 30px; 
      left: 20px;
      right: 100px; /* Space for the side nav */
      height: 120px; 
      display: flex; 
      align-items: center;
      overflow-x: auto; 
      gap: 15px; 
      padding: 10px;
      z-index: 90; /* High z-index to ensure visibility */
      background: rgba(0,0,0,0.3); /* Subtle dark back to see gold better */
      border-radius: 20px;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    /* Styling the images coming from core.js */
    #jewelry-options img, .thumb-btn {
      min-width: 90px !important;
      max-width: 90px !important;
      height: 90px !important;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      object-fit: contain;
      cursor: pointer;
      transition: 0.3s;
    }

    #jewelry-options img:hover {
      border-color: var(--prism-gold);
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.1);
    }

    /* AI Hub */
    #ai-concierge-container {
      position: fixed; top: 20px; right: 20px; z-index: 100;
    }
    #ai-avatar {
      width: 50px; height: 50px;
      background: #000; border: 1px solid var(--prism-gold);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 10px;
    }
  </style>
</head>
<body>

  <div id="app">
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="handleCategoryClick('earrings', this)">Earrings</div>
      <div class="cat" onclick="handleCategoryClick('chains', this)">Chains</div>
      <div class="cat" onclick="handleCategoryClick('rings', this)">Rings</div>
      <div class="cat" onclick="handleCategoryClick('bangles', this)">Bangles</div>
    </div>

    <div id="jewelry-options">
        </div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()">✨</div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    /**
     * BRIDGE FUNCTION
     * This connects the new HTML buttons to your core logic.
     */
    function handleCategoryClick(type, element) {
        // Update UI
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        
        console.log("Switching to:", type);

        // Call your existing core.js logic
        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    /**
     * AUTO-INITIALIZE
     * Forces the products to load when the page finishes loading.
     */
    window.addEventListener('load', () => {
        // Small delay to ensure core.js is fully ready
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) {
                handleCategoryClick('earrings', activeBtn);
            }
        }, 1000); 
    });
  </script>
</body>
</html>
