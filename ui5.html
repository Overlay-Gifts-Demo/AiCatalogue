<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Luxury AR</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin: 0; background: black; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; }

    /* 1. AR BACKGROUND LAYER */
    #video-container { position: fixed; inset: 0; background: black; z-index: 0; }
    #webcam, #overlay { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    #webcam { transform: scaleX(-1); }

    /* 2. CENTER FOCUS CIRCLE */
    #center-focus {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; pointer-events: none; z-index: 5;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
      font-weight: bold; letter-spacing: 2px;
    }

    /* 3. LUXURY CATEGORY BUTTONS */
    .cat {
      position: fixed; width: 90px; height: 90px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.6); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px); z-index: 10; transition: all 0.3s ease;
      font-size: 12px; text-transform: uppercase; font-weight: 600;
    }
    .cat.active { border-color: #d4af37; background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); color: #d4af37; }

    /* Positions based on your design */
    #earrings-node { top: 10%; left: 50%; transform: translateX(-50%); }
    #chains-node { top: 50%; left: 5%; transform: translateY(-50%); }
    #rings-node { top: 50%; right: 5%; transform: translateY(-50%); }
    #bangles-node { bottom: 15%; left: 50%; transform: translateX(-50%); }

    /* 4. PREMIUM PRODUCT BAR (Injected by core.js) */
    #jewelry-options {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.6));
      display: flex; overflow-x: auto; gap: 12px; padding: 15px;
      box-sizing: border-box; z-index: 10; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    .thumb-btn {
      min-width: 70px; height: 70px; background: #1a1a1a;
      border-radius: 12px; border: 1px solid #333; object-fit: contain;
      cursor: pointer; transition: 0.3s; padding: 5px;
    }
    .thumb-btn:hover { border-color: #d4af37; transform: translateY(-5px); }

    /* TOP UTILITY BAR */
    #top-bar { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; }
    .util-btn { background: rgba(0,0,0,0.5); border: 1px solid #d4af37; color: #d4af37; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="app">
    <div id="flash-overlay"></div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="loading-status" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#d4af37;">LOADING LUXURY ENGINE...</div>
    </div>

    <div id="center-focus">TRY ON</div>

    <div id="earrings-node" class="cat active" onclick="selectJewelryType('earrings', this)">Ear</div>
    <div id="chains-node" class="cat" onclick="selectJewelryType('chains', this)">Chain</div>
    <div id="rings-node" class="cat" onclick="selectJewelryType('rings', this)">Ring</div>
    <div id="bangles-node" class="cat" onclick="selectJewelryType('bangles', this)">Bang</div>

    <div id="top-bar">
        <div class="brand-left"><img src="logo.png" style="height:30px; opacity:0.8;"></div>
        <div style="display:flex; gap:10px;">
            <button class="util-btn" onclick="takeSnapshot()">📷 SNAP</button>
            <button class="util-btn" onclick="toggleCoShop()">👥 CO-SHOP</button>
        </div>
    </div>

    <div id="jewelry-options" class="carousel-cards"></div>

    <div id="ai-concierge-container">
        <div id="ai-bubble">Tap to activate Nila</div>
        <div id="ai-avatar" onclick="toggleConciergeMute()"><div class="avatar-face">🤖</div></div>
    </div>

    <div id="preview-modal" style="display:none;"><span class="close-preview" onclick="closePreview()">&times;</span><div class="preview-container"><img id="preview-image" src=""></div></div>
    <div id="toast-notification"></div>
  </div>

  <script src="core.js"></script>

  <script>
    /**
     * Integrates the Luxury UI nodes with the Jewels-Ai core functions
     */
    const engineSelect = window.selectJewelryType;
    window.selectJewelryType = async function(type, element) {
        // Update UI states
        document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
        if (element) {
            element.classList.add("active");
        } else {
            // Find correct node if called via voice or init
            const node = document.getElementById(`${type}-node`);
            if (node) node.classList.add("active");
        }

        // Call core logic for camera switching and asset fetching
        if (typeof engineSelect === 'function') {
            await engineSelect(type);
        }
    };

    // Auto-init with Luxury Earring category
    window.addEventListener('load', () => {
        setTimeout(() => {
            window.selectJewelryType('earrings', document.getElementById('earrings-node'));
        }, 1200);
    });
  </script>
</body>
</html>
