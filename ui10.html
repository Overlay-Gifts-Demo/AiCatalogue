<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | Constellation UI</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --star-gold: #FFD700;
      --starlight: rgba(255, 255, 255, 0.8);
      --void-bg: rgba(0, 0, 0, 0.4);
    }

    body, html {
      margin: 0; padding: 0;
      background: #000; color: white;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden; height: 100vh;
    }

    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* COSMIC NAVIGATION: Top Floating Clusters */
    #dock {
      position: fixed; top: 30px; left: 20px; right: 20px;
      display: flex; justify-content: space-between;
      z-index: 100;
    }

    .nav-group { display: flex; gap: 15px; }

    .cat {
      width: 55px; height: 55px;
      background: var(--void-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cat span {
      font-size: 8px; text-transform: uppercase;
      letter-spacing: 1px; margin-top: 4px; color: var(--starlight);
      opacity: 0; transition: 0.3s;
    }

    /* Active Star: Becomes a bright point of light */
    .cat.active {
      background: #fff;
      transform: scale(1.1);
      box-shadow: 0 0 30px #fff, 0 0 60px var(--star-gold);
      border-color: #fff;
    }
    .cat.active .icon { filter: brightness(0); }
    .cat.active span { opacity: 1; color: #000; font-weight: bold; }

    /* STELLAR TRAY: Bottom Horizontal Flow */
    #jewelry-options {
      position: fixed; bottom: 40px; left: 0; width: 100%;
      height: 140px; display: flex; 
      align-items: center; overflow-x: auto;
      gap: 30px; padding: 0 60px;
      z-index: 90; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    /* The Jewelry "Stars" */
    #jewelry-options img, .thumb-btn {
      min-width: 90px !important;
      height: 90px !important;
      object-fit: contain;
      background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      filter: drop-shadow(0 0 5px rgba(255,215,0,0.3));
    }

    #jewelry-options img:hover {
      transform: scale(1.4) translateY(-20px);
      filter: drop-shadow(0 0 15px var(--star-gold));
    }

    /* AI NEBULA */
    #ai-concierge-container {
      position: fixed; top: 50%; right: 20px;
      transform: translateY(-50%); z-index: 110;
    }
    #ai-avatar {
      width: 40px; height: 40px;
      background: transparent;
      border: 1px solid var(--star-gold);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      cursor: pointer;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 0px var(--star-gold); }
      50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 20px var(--star-gold); }
    }

    /* Background Overlay for Depth */
    .cosmic-overlay {
        position: fixed; inset: 0;
        background: radial-gradient(circle at bottom, rgba(255,215,0,0.05) 0%, transparent 50%);
        pointer-events: none; z-index: 1;
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="cosmic-overlay"></div>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
        <div class="nav-group">
            <div class="cat active" onclick="handleStarClick('earrings', this)">
                <div class="icon">✨</div><span>Earrings</span>
            </div>
            <div class="cat" onclick="handleStarClick('chains', this)">
                <div class="icon">💎</div><span>Chains</span>
            </div>
        </div>
        <div class="nav-group">
            <div class="cat" onclick="handleStarClick('rings', this)">
                <div class="icon">💍</div><span>Rings</span>
            </div>
            <div class="cat" onclick="handleStarClick('bangles', this)">
                <div class="icon">☄️</div><span>Bangles</span>
            </div>
        </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()">⭐</div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleStarClick(type, element) {
        // UI Selection
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');

        // Logic call
        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleStarClick('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
