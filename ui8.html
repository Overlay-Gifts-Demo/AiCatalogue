<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop UI</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}


/* MAIN LAYOUT */

#main{
display:flex;
width:100vw;
height:100vh;
}


/* LEFT CATEGORY */

#left{
width:150px;
background:#111;
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
box-sizing:border-box;
}

.cat{
background:#222;
color:white;
padding:10px;
text-align:center;
border-radius:6px;
cursor:pointer;
}

.cat.active{
background:gold;
color:black;
}


/* CAMERA */

#camera{
flex:1;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
}


/* RIGHT PRODUCTS */

#right{
width:320px;
background:#000;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
box-sizing:border-box;
overflow-y:auto;
}

.product{
background:#222;
color:white;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
border:2px solid #444;
cursor:pointer;
}

.product:hover{
border:2px solid gold;
}

</style>
</head>
<body>



<div id="main">


<div id="left">

<div class="cat" onclick="loadCategory('earrings',this)">Earrings</div>
<div class="cat" onclick="loadCategory('chains',this)">Chains</div>
<div class="cat" onclick="loadCategory('rings',this)">Rings</div>
<div class="cat" onclick="loadCategory('bangles',this)">Bangles</div>

</div>



<div id="camera">
Camera / AR Screen
</div>



<div id="right"></div>



</div>



<script>

const counts = {
earrings:15,
chains:15,
rings:15,
bangles:15
};


function loadCategory(name, el){

document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

const box = document.getElementById("right");

box.innerHTML="";

for(let i=1;i<=counts[name];i++){

let p = document.createElement("div");

p.className="product";

p.innerText=name+" "+i;

p.onclick=()=>{

document.getElementById("camera").innerText =
"Trying "+name+" "+i;

};

box.appendChild(p);

}

}


loadCategory("earrings", document.querySelectorAll(".cat")[0]);

</script>



</body>
</html>
