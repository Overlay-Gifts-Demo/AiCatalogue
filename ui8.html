<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Shop AR UI</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin: 0; background: black; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; }

    /* MAIN LAYOUT */
    #main-layout { display: flex; width: 100vw; height: 100vh; }

    /* LEFT CATEGORY PANEL */
    #side-categories {
      width: 150px; background: #111; display: flex; flex-direction: column;
      padding: 15px; gap: 12px; box-sizing: border-box; z-index: 20;
      border-right: 1px solid #333;
    }

    .cat-item {
      background: #222; color: white; padding: 12px; text-align: center;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.3s;
      border: 1px solid transparent;
    }

    .cat-item.active { background: #d4af37; color: black; font-weight: bold; border-color: #d4af37; }

    /* CENTER CAMERA / AR VIEWPORT */
    #video-container {
      flex: 1; position: relative; background: #000; overflow: hidden; z-index: 1;
    }
    #webcam, #overlay { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    #webcam { transform: scaleX(-1); }

    /* RIGHT PRODUCT GRID (Linked to core.js) */
    #jewelry-options {
      width: 320px; background: #080808; display: grid;
      grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px;
      box-sizing: border-box; overflow-y: auto; z-index: 20;
      border-left: 1px solid #333; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    .thumb-btn {
      aspect-ratio: 1; width: 100%; background: #1a1a1a;
      border-radius: 8px; border: 2px solid #333; object-fit: contain;
      cursor: pointer; transition: 0.3s; padding: 5px;
    }
    .thumb-btn:hover { border-color: #d4af37; transform: scale(1.03); }

    /* PREMIUM OVERLAYS */
    #loading-status { position: fixed; top: 50%; left: 45%; transform: translate(-50%, -50%); color: #d4af37; z-index: 5; }
    #top-util { position: fixed; top: 20px; right: 340px; display: flex; gap: 10px; z-index: 20; }
  </style>
</head>

<body>
  <div id="app">
    <div id="flash-overlay"></div>

    <div id="main-layout">
      <div id="side-categories">
        <div class="cat-item active" onclick="handleCategory('earrings', this)">Earrings</div>
        <div class="cat-item" onclick="handleCategory('chains', this)">Chains</div>
        <div class="cat-item" onclick="handleCategory('rings', this)">Rings</div>
        <div class="cat-item" onclick="handleCategory('bangles', this)">Bangles</div>
        
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button class="pill accent" onclick="takeSnapshot()" style="width:100%;">📷 SNAP</button>
            <button class="pill" onclick="toggleCoShop()" style="width:100%;">👥 SHOP</button>
        </div>
      </div>

      <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="loading-status">INITIALIZING...</div>
      </div>

      <div id="jewelry-options"></div>
    </div>

    <div id="ai-concierge-container">
        <div id="ai-bubble">Hi, I'm Nila</div>
        <div id="ai-avatar" onclick="toggleConciergeMute()"><div class="avatar-face">🤖</div></div>
    </div>

    <div id="preview-modal" style="display:none;"><span class="close-preview" onclick="closePreview()">&times;</span><div class="preview-container"><img id="preview-image" src=""></div></div>
    <div id="toast-notification"></div>
  </div>

  <script src="core.js"></script>

  <script>
    /**
     * Connects the Shop UI panels to the AR Engine
     */
    async function handleCategory(name, el) {
        // Update Side Panel UI
        document.querySelectorAll(".cat-item").forEach(c => c.classList.remove("active"));
        el.classList.add("active");

        // Execute Engine logic (Camera switching and asset fetching from Drive)
        if (typeof window.selectJewelryType === 'function') {
            await window.selectJewelryType(name);
        }
    }

    // Auto-initialize on load
    window.addEventListener('load', () => {
        setTimeout(() => {
            handleCategory('earrings', document.querySelector('.cat-item'));
        }, 1200);
    });
  </script>
</body>
</html>
