<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Try On UI - Dropdown Grid</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
}


/* TOP BAR */

#topbar{
height:60px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #333;
}

select{
padding:8px 12px;
font-size:16px;
background:#222;
color:white;
border:1px solid #555;
border-radius:6px;
}


/* CAMERA */

#camera{
height:40vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
border-bottom:1px solid #333;
}


/* GRID AREA */

#grid{
height:calc(60vh - 60px);
background:#000;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
box-sizing:border-box;
overflow-y:auto;
}


/* PRODUCT */

.product{
background:#222;
border:2px solid #444;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
height:70px;
cursor:pointer;
}

.product:hover{
border:2px solid gold;
}

</style>
</head>
<body>



<div id="topbar">

<select id="category" onchange="loadCategory()">

<option value="earrings">Earrings</option>
<option value="chains">Chains</option>
<option value="rings">Rings</option>
<option value="bangles">Bangles</option>

</select>

</div>



<div id="camera">
Camera / AR Screen
</div>



<div id="grid"></div>



<script>

const counts = {
earrings:15,
chains:15,
rings:15,
bangles:15
};


function loadCategory(){

let cat = document.getElementById("category").value;

let grid = document.getElementById("grid");

grid.innerHTML = "";

for(let i=1;i<=counts[cat];i++){

let div = document.createElement("div");

div.className = "product";

div.innerText = cat + " " + i;

div.onclick = function(){

document.getElementById("camera").innerText =
"Trying " + cat + " " + i;

};

grid.appendChild(div);

}

}


loadCategory();

</script>



</body>
</html>
