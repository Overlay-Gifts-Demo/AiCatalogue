<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | High Contrast Liquid UI</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --merc-gold: #FFD700;
      --glass-dark: rgba(0, 0, 0, 0.7);
    }

    body, html {
      margin: 0; padding: 0;
      background: #000;
      color: white; font-family: 'Inter', sans-serif;
      overflow: hidden; height: 100vh;
    }

    /* Video Background */
    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* SIDEBAR: Wider and more opaque for visibility */
    #dock {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 180px; /* Fixed width so text is always visible */
      background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex; flex-direction: column; justify-content: center;
      z-index: 100;
    }

    .cat {
      display: flex; align-items: center;
      padding: 20px 25px; cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    /* Text styling: Force visibility */
    .cat span {
      margin-left: 15px; 
      font-size: 14px; 
      font-weight: 800;
      text-transform: uppercase; 
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6); /* Dimmed when inactive */
    }

    /* Active state: High contrast Gold background with Black text */
    .cat.active {
      background: var(--merc-gold);
      border-radius: 0 50px 50px 0;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .cat.active span {
      color: #000 !important; /* Black text on gold for maximum visibility */
    }

    .cat.active .icon {
        filter: brightness(0); /* Makes emoji/icon black to match text */
    }

    /* JEWELRY TRAY */
    #jewelry-options {
      position: fixed; bottom: 40px; left: 200px; right: 20px;
      height: 120px; display: flex; align-items: center;
      overflow-x: auto; gap: 20px; z-index: 90;
      scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    #jewelry-options img, .thumb-btn {
      min-width: 90px; height: 90px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
      object-fit: contain; padding: 10px; cursor: pointer;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #jewelry-options img:hover {
      transform: scale(1.2);
      border-color: var(--merc-gold);
    }

    /* AI Avatar */
    #ai-concierge-container {
      position: fixed; top: 30px; right: 30px; z-index: 100;
    }
    #ai-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid var(--merc-gold);
      background: #000; display: flex; align-items: center; justify-content: center;
    }

  </style>
</head>
<body>

  <div id="app">
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="handleCategory('earrings', this)">
          <span class="icon">💎</span><span>Earrings</span>
      </div>
      <div class="cat" onclick="handleCategory('chains', this)">
          <span class="icon">🔗</span><span>Chains</span>
      </div>
      <div class="cat" onclick="handleCategory('rings', this)">
          <span class="icon">💍</span><span>Rings</span>
      </div>
      <div class="cat" onclick="handleCategory('bangles', this)">
          <span class="icon">✨</span><span>Bangles</span>
      </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()">✨</div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleCategory(type, element) {
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');

        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleCategory('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
