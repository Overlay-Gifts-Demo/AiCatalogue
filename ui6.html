<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | Orbital HUD</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --hud-gold: #FFD700;
      --hud-glow: rgba(255, 215, 0, 0.4);
      --hud-glass: rgba(0, 0, 0, 0.5);
    }

    body, html {
      margin: 0; padding: 0;
      background: #000; color: white;
      font-family: 'Orbitron', sans-serif; /* Futuristic font */
      overflow: hidden; height: 100vh;
    }

    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* HUD CATEGORY ARC (Left Side) */
    #dock {
      position: fixed; left: -20px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 20px; z-index: 100;
      padding-left: 40px;
    }

    .cat {
      width: 100px; height: 35px;
      background: var(--hud-glass);
      backdrop-filter: blur(10px);
      border-left: 4px solid var(--hud-gold);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; padding-left: 15px;
      cursor: pointer; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
      transition: 0.4s ease;
      clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%);
    }

    .cat.active {
      width: 130px;
      background: var(--hud-gold);
      color: #000;
      box-shadow: 0 0 20px var(--hud-glow);
      border-left: 6px solid #fff;
    }

    /* ORBITAL JEWELRY RACK (Bottom) */
    #jewelry-options {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      width: 90%; max-width: 800px;
      height: 120px; display: flex;
      align-items: center; overflow-x: auto;
      gap: 20px; padding: 10px 40px;
      z-index: 90; scrollbar-width: none;
      background: radial-gradient(ellipse at bottom, rgba(255,215,0,0.15) 0%, transparent 70%);
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    /* The "Holographic" Buttons */
    #jewelry-options img, .thumb-btn {
      min-width: 85px !important;
      max-width: 85px !important;
      height: 85px !important;
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 50%; /* Circle shape for orbital feel */
      background: rgba(0, 0, 0, 0.6);
      padding: 10px; object-fit: contain;
      cursor: pointer; transition: 0.3s;
      box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
    }

    #jewelry-options img:hover {
      transform: scale(1.2) rotate(5deg);
      border-color: var(--hud-gold);
      box-shadow: 0 0 25px var(--hud-glow);
    }

    /* AI "CORE" (Top Left) */
    #ai-concierge-container {
      position: fixed; top: 30px; left: 30px; z-index: 100;
      display: flex; align-items: center; gap: 15px;
    }
    #ai-avatar {
      width: 40px; height: 40px;
      border: 2px solid var(--hud-gold);
      border-radius: 50%; position: relative;
      animation: rotateCore 4s linear infinite;
      cursor: pointer;
    }
    #ai-avatar::before {
      content: ''; position: absolute; inset: 4px;
      border: 1px dashed var(--hud-gold); border-radius: 50%;
    }
    @keyframes rotateCore { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #ai-bubble {
        font-size: 11px; letter-spacing: 2px; color: var(--hud-gold);
        text-transform: uppercase;
    }

    /* SCREEN OVERLAY SCANNER GIMBAL */
    .gimbal-corner {
        position: fixed; width: 40px; height: 40px;
        border: 1px solid rgba(255, 215, 0, 0.3);
        z-index: 10; pointer-events: none;
    }
    .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
    .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

    /* Modal */
    #preview-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 200;
      flex-direction: column; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="gimbal-corner top-right"></div>
    <div class="gimbal-corner bottom-right"></div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="handleHUDClick('earrings', this)">Earrings</div>
      <div class="cat" onclick="handleHUDClick('chains', this)">Chains</div>
      <div class="cat" onclick="handleHUDClick('rings', this)">Rings</div>
      <div class="cat" onclick="handleHUDClick('bangles', this)">Bangles</div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()"></div>
        <div id="ai-bubble">System.Nila_Active</div>
    </div>

    <div id="preview-modal">
        <img id="preview-image" src="" style="max-width: 80%; border: 1px solid var(--hud-gold);">
        <button onclick="downloadSingleSnapshot()" style="margin-top:20px; background:var(--hud-gold); color:black; border:none; padding:10px 40px; font-weight:bold; cursor:pointer;">STORE DATA</button>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleHUDClick(type, element) {
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        
        // Trigger core.js function
        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    // Initialize after a slight delay
    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleHUDClick('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
