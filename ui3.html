<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Netflix Premium AR</title>
  
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin: 0; background: black; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; }
    
    /* BACKGROUND CAMERA */
    #video-container { position: fixed; inset: 0; background: black; z-index: 1; }
    #webcam, #overlay { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    #webcam { transform: scaleX(-1); }

    /* NETFLIX OVERLAY PANEL */
    #netflix-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 45%;
      background: linear-gradient(to top, rgba(0,0,0,1) 80%, rgba(0,0,0,0));
      overflow-y: auto; z-index: 10; padding: 20px; box-sizing: border-box;
      scrollbar-width: none;
    }
    #netflix-panel::-webkit-scrollbar { display: none; }
    .category-title { color: #d4af37; font-size: 16px; margin: 15px 0 5px 0; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    .row { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
    .row::-webkit-scrollbar { display: none; }
    .product-card { min-width: 90px; height: 90px; background: #222; border-radius: 12px; border: 2px solid #444; cursor: pointer; transition: 0.3s; }
    .product-card:hover { border-color: gold; transform: scale(1.05); }

    /* TOP ACTION BAR */
    #top-actions { position: fixed; top: 20px; right: 20px; z-index: 20; display: flex; gap: 10px; }
    .action-btn { background: rgba(0,0,0,0.6); border: 1px solid #d4af37; color: #d4af37; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; backdrop-filter: blur(5px); }
    
    #status { position: fixed; top: 10px; left: 10px; z-index: 100; color: gold; font-size: 10px; opacity: 0.7; }
  </style>
</head>
<body>

  <div id="status">INITIALIZING...</div>

  <div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="flash-overlay"></div>
  </div>

  <div id="top-actions">
    <button class="action-btn" onclick="toggleVoiceControl()" title="Voice">🎙️</button>
    <button class="action-btn" onclick="toggleCoShop()" title="Co-Shop">👥</button>
    <button class="action-btn" onclick="openDailyDrop()" title="Daily">✨</button>
    <button class="action-btn" onclick="takeSnapshot()" title="Capture">📷</button>
  </div>

  <div id="netflix-panel">
    </div>

  <div id="ai-concierge-container">
    <div id="ai-bubble">Tap to activate Nila</div>
    <div id="ai-avatar" onclick="toggleConciergeMute()">
        <div class="avatar-ring"></div>
        <div class="avatar-face">🤖</div> 
    </div>
  </div>

  <div id="whatsapp-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
          <h2>Save Your Vibe</h2>
          <input type="tel" id="user-phone" placeholder="919999999999" class="input-dark">
          <button class="pill accent" onclick="confirmWhatsAppDownload()">Send & Download</button>
      </div>
  </div>

  <div id="preview-modal" style="display:none;">
      <span class="close-preview" onclick="closePreview()">&times;</span>
      <div class="preview-container"><img id="preview-image" src=""></div>
      <div class="preview-actions">
          <button class="pill accent" onclick="openWhatsAppModal()">WhatsApp</button>
          <button class="pill" onclick="downloadSingleSnapshot()">Download</button>
      </div>
  </div>

  <script src="core.js"></script>
  <script>
    const API_KEY = "AIzaSyAXG3iG2oQjUA_BpnO8dK8y-MHJ7HLrhyE";
    const DRIVE_FOLDERS = {
      earrings: "1eftKhpOHbCj8hzO11-KioFv03g0Yn61n",
      chains: "1G136WEiA9QBSLtRk0LW1fRb3HDZb4VBD",
      rings: "1iB1qgTE-Yl7w-CVsegecniD_DzklQk90",
      bangles: "1d2b7I8XlhIEb8S_eXnRFBEaNYSwngnba"
    };

    const videoEl = document.getElementById('webcam');
    
    // START CAMERA & KEEP OPEN
    async function initSystem() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 1280, height: 720, facingMode: 'user' } 
        });
        videoEl.srcObject = stream;
        document.getElementById('status').innerText = "ENGINE LIVE";
        loadNetflixRows();
      } catch (err) {
        document.getElementById('status').innerText = "CAMERA BLOCKED";
      }
    }

    // LOAD DYNAMIC ROWS FROM DRIVE
    async function loadNetflixRows() {
      const panel = document.getElementById('netflix-panel');
      for (const [name, id] of Object.entries(DRIVE_FOLDERS)) {
        const url = `https://www.googleapis.com/drive/v3/files?q='${id}' in parents and trashed=false&fields=files(id,name,thumbnailLink)&key=${API_KEY}`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        if (data.files) {
          const title = document.createElement('div');
          title.className = 'category-title';
          title.innerText = name;
          panel.appendChild(title);

          const row = document.createElement('div');
          row.className = 'row';
          data.files.forEach((file, idx) => {
            const img = document.createElement('img');
            img.className = 'product-card';
            img.src = file.thumbnailLink.replace(/=s\d+$/, "=s400");
            img.onclick = () => {
                // Use core.js functions to apply jewelry
                selectJewelryType(name);
                const asset = {
                    id: file.id,
                    name: file.name,
                    fullSrc: file.thumbnailLink.replace(/=s\d+$/, "=s2000")
                };
                applyAssetInstantly(asset, idx, true);
            };
            row.appendChild(img);
          });
          panel.appendChild(row);
        }
      }
    }

    window.onload = initSystem;
  </script>
</body>
</html>
