<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Premium Virtual Try-On</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --gold: #D4AF37;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-dark: rgba(0, 0, 0, 0.6);
      --blur: blur(15px);
    }

    body, html {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000; color: white;
      overflow: hidden; height: 100%;
    }

    /* Fullscreen AR Background */
    #video-container {
      position: fixed; top: 0; left: 0; 
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    #webcam, #overlay, #remote-video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
    }

    /* Floating Header */
    header {
      position: fixed; top: 20px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }

    .brand {
      font-size: 1.2rem; font-weight: 300; letter-spacing: 4px;
      text-transform: uppercase; color: var(--gold);
      background: var(--glass-dark); padding: 10px 20px;
      border-radius: 50px; backdrop-filter: var(--blur);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    /* Floating Jewelry Selection */
    #jewelry-options {
      position: fixed; bottom: 120px; left: 50%;
      transform: translateX(-50%);
      width: 90%; max-width: 600px;
      display: flex; overflow-x: auto; gap: 15px; padding: 15px;
      z-index: 15; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    .thumb-btn {
      min-width: 80px; height: 80px;
      background: var(--glass-dark);
      border-radius: 18px; object-fit: contain;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: var(--blur);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .thumb-btn:hover { transform: scale(1.1); border-color: var(--gold); }

    /* Floating Modern Dock */
    #dock {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: var(--glass-dark);
      backdrop-filter: var(--blur);
      display: flex; padding: 8px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .cat {
      padding: 12px 25px; border-radius: 100px;
      cursor: pointer; transition: 0.4s;
      font-size: 13px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .cat.active {
      background: var(--gold); color: black;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }

    /* AI Assistant - Minimalist */
    #ai-concierge-container {
      position: fixed; top: 20px; right: 20px; z-index: 30;
    }

    #ai-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--gold); display: flex;
      align-items: center; justify-content: center;
      cursor: pointer; font-size: 24px;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }

    #ai-bubble {
      position: absolute; right: 65px; top: 10px;
      background: white; color: black; padding: 8px 15px;
      border-radius: 15px 15px 0 15px; font-size: 12px;
      white-space: nowrap; font-weight: bold;
    }

    /* Status & Loading */
    #loading-status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 200; letter-spacing: 2px;
    }

    /* Notification */
    #toast-notification {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: var(--gold); color: black; padding: 10px 25px;
      border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.3s;
    }

    /* Modal Styling */
    #preview-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.95); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
    }
    #preview-image { max-width: 80%; max-height: 70%; border-radius: 20px; }
    .close-preview { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; }
    .preview-actions button {
      margin-top: 20px; padding: 15px 40px; background: var(--gold);
      border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="app">
    <header>
      <div class="brand">Jewels AI</div>
    </header>

    <div id="flash-overlay"></div>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
      <div id="loading-status">ENCHANTING EXPERIENCE...</div>
    </div>

    <div id="jewelry-options">
      </div>

    <div id="dock">
      <div class="cat active" onclick="selectJewelryType('earrings', this)">Earrings</div>
      <div class="cat" onclick="selectJewelryType('chains', this)">Chains</div>
      <div class="cat" onclick="selectJewelryType('rings', this)">Rings</div>
      <div class="cat" onclick="selectJewelryType('bangles', this)">Bangles</div>
    </div>

    <div id="ai-concierge-container">
        <div id="ai-bubble">Nila is here</div>
        <div id="ai-avatar" onclick="toggleConciergeMute()">
            <div class="avatar-face">✨</div> 
        </div>
    </div>

    <div id="preview-modal">
      <span class="close-preview">&times;</span>
      <img id="preview-image" src="">
      <div class="preview-actions">
        <button onclick="downloadSingleSnapshot()">SAVE TO GALLERY</button>
      </div>
    </div>

    <div id="toast-notification"></div>
  </div>

  <script src="core.js"></script>
</body>
</html>
