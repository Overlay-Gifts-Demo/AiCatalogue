<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Try On UI - Netflix Style</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* CAMERA */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
z-index:1;
}


/* PANEL */

#panel{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40%;
background:rgba(0,0,0,0.85);
overflow-y:auto;
z-index:2;
padding:10px;
box-sizing:border-box;
}


/* CATEGORY */

.category{
color:white;
font-size:16px;
margin-top:10px;
}


/* ROW */

.row{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 0;
}


/* PRODUCT */

.product{
min-width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:12px;
border:2px solid #444;
cursor:pointer;
}

.product:hover{
border:2px solid gold;
}

</style>
</head>
<body>


<div id="camera">
Camera / AR Screen
</div>


<div id="panel"></div>



<script>

const categories = [
"earrings",
"chains",
"rings",
"bangles"
];

const count = 15;


const panel = document.getElementById("panel");


categories.forEach(cat=>{

let title = document.createElement("div");
title.className="category";
title.innerText=cat.toUpperCase();

panel.appendChild(title);


let row = document.createElement("div");
row.className="row";


for(let i=1;i<=count;i++){

let p = document.createElement("div");
p.className="product";

p.innerText = cat + " " + i;

p.onclick = ()=>{

document.getElementById("camera").innerText =
"Trying " + cat + " " + i;

};

row.appendChild(p);

}

panel.appendChild(row);

});

</script>


</body>
</html>
