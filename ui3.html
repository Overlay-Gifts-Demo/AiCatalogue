<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Netflix AR</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin:0; background:black; font-family: 'Montserrat', sans-serif; overflow:hidden; }
    
    /* 1. Camera Layer - Must be below UI */
    #video-container { position:fixed; inset:0; background:black; z-index:1; }
    #webcam, #overlay { position:absolute; width:100%; height:100%; object-fit:contain; }
    #webcam { transform: scaleX(-1); } /* Mirror for front camera */

    /* 2. Netflix Panel - Scrolling rows */
    #netflix-panel {
      position:fixed; bottom:0; left:0; width:100%; height:45%;
      background: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
      overflow-y:auto; z-index:10; padding:20px; box-sizing:border-box;
      scrollbar-width: none;
    }
    .category-title { color:#d4af37; font-size:16px; margin:15px 0 5px 0; text-transform:uppercase; font-weight:bold; }
    .row { display:flex; overflow-x:auto; gap:12px; padding:10px 0; scrollbar-width:none; }
    .product-card { 
        min-width:85px; height:85px; background:#222; border-radius:10px; 
        border:2px solid #444; object-fit:contain; cursor:pointer; 
    }
    .product-card:hover { border-color: gold; transform: scale(1.05); }

    #loading-status { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:gold; z-index:2; }
  </style>
</head>
<body>

  <div id="app">
    <div id="flash-overlay"></div>
    <div id="loading-status">Initializing Camera...</div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="netflix-panel">
      </div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()"><div class="avatar-face">🤖</div></div>
    </div>
  </div>

  <script src="core.js"></script>
  
  <script>
    async function buildNetflixUI() {
      // 1. Force Start Camera immediately to avoid black screen
      if (typeof startCameraFast === 'function') {
          await startCameraFast('user'); 
          document.getElementById('loading-status').style.display = 'none';
      }

      const categories = ['earrings', 'chains', 'rings', 'bangles'];
      const panel = document.getElementById("netflix-panel");
      
      for (const cat of categories) {
        const assets = await fetchCategoryData(cat); 
        if (assets && assets.length > 0) {
          let title = document.createElement("div");
          title.className = "category-title";
          title.innerText = cat;
          panel.appendChild(title);

          let row = document.createElement("div");
          row.className = "row";

          assets.forEach((asset, index) => {
            let img = document.createElement("img");
            img.className = "product-card";
            img.src = asset.thumbSrc;
            img.onclick = () => {
              // Trigger AR for the specific category
              const mode = (cat === 'rings' || cat === 'bangles') ? 'environment' : 'user';
              startCameraFast(mode); 
              window.JewelsState.currentType = cat;
              applyAssetInstantly(asset, index, true);
            };
            row.appendChild(img);
          });
          panel.appendChild(row);
        }
      }
    }

    // Run UI builder when everything is loaded
    window.addEventListener('load', buildNetflixUI);
  </script>
</body>
</html>
