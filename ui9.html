<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Step UI</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}


/* CAMERA */

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:70%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
}


/* STEP BAR */

#steps{
position:fixed;
top:70%;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.step{
padding:6px 10px;
background:#222;
color:white;
border-radius:6px;
}

.step.active{
background:gold;
color:black;
}


/* PANEL */

#panel{
position:fixed;
bottom:0;
left:0;
width:100%;
height:30%;
background:rgba(0,0,0,0.9);
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
box-sizing:border-box;
overflow:auto;
}

.item{
width:70px;
height:70px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
border:2px solid #444;
cursor:pointer;
}

.item:hover{
border:2px solid gold;
}

</style>
</head>
<body>



<div id="camera">
Camera / AR Screen
</div>



<div id="steps">

<div class="step" id="s1">Category</div>
<div class="step" id="s2">Product</div>
<div class="step" id="s3">Try</div>

</div>



<div id="panel"></div>



<script>

let step = 1;
let currentCategory = "";

const counts = {
earrings:15,
chains:15,
rings:15,
bangles:15
};


function setStep(n){

step = n;

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));

document.getElementById("s"+n).classList.add("active");

}


function showCategories(){

setStep(1);

const p = document.getElementById("panel");

p.innerHTML="";

["earrings","chains","rings","bangles"].forEach(cat=>{

let d = document.createElement("div");

d.className="item";

d.innerText=cat;

d.onclick=()=>{

currentCategory = cat;

showProducts();

};

p.appendChild(d);

});

}


function showProducts(){

setStep(2);

const p = document.getElementById("panel");

p.innerHTML="";

for(let i=1;i<=counts[currentCategory];i++){

let d = document.createElement("div");

d.className="item";

d.innerText=currentCategory+" "+i;

d.onclick=()=>{

document.getElementById("camera").innerText =
"Trying "+currentCategory+" "+i;

setStep(3);

};

p.appendChild(d);

}

}


showCategories();

</script>



</body>
</html>
