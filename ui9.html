<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | Solar Flare UI</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --solar-gold: #FFCC33;
      --deep-obsidian: #0D0D0D;
    }

    body, html {
      margin: 0; padding: 0;
      background: #000; color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden; height: 100vh;
    }

    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* THE SOLAR HUB (Bottom Left Navigation) */
    #nav-container {
      position: fixed; bottom: 30px; left: 30px;
      z-index: 100;
    }

    #dock {
      display: flex; gap: 15px; align-items: flex-end;
    }

    .cat {
      width: 60px; height: 60px;
      background: var(--deep-obsidian);
      border: 2px solid rgba(255, 204, 51, 0.3);
      border-radius: 20px 20px 5px 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
    }

    .cat span {
      font-size: 8px; font-weight: 900;
      text-transform: uppercase; margin-top: 5px;
      opacity: 0; transition: 0.3s;
    }

    /* Active Flare Animation */
    .cat.active {
      height: 90px;
      background: var(--solar-gold);
      border-color: #fff;
      transform: translateY(-10px);
      box-shadow: 0 0 30px rgba(255, 204, 51, 0.6);
    }

    .cat.active span { opacity: 1; color: #000; }
    .cat.active .icon { filter: brightness(0); transform: scale(1.2); }

    /* THE ORBITAL TRAY (Bottom Carousel) */
    #jewelry-options {
      position: fixed; bottom: 40px; left: 120px; right: 20px;
      height: 140px; display: flex; align-items: center;
      overflow-x: auto; gap: 35px; padding-left: 50px;
      z-index: 90; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    #jewelry-options img, .thumb-btn {
      min-width: 100px !important;
      height: 100px !important;
      object-fit: contain;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 80%);
      border-radius: 50%;
      cursor: pointer;
      /* Swing animation for floating effect */
      animation: swing 4s ease-in-out infinite;
      transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    #jewelry-options img:hover {
      transform: scale(1.5) !important;
      background: radial-gradient(circle, rgba(255,204,51,0.4) 0%, transparent 70%);
      z-index: 10;
    }

    /* AI SOLAR CORE */
    #ai-concierge-container {
      position: fixed; top: 30px; right: 30px; z-index: 110;
    }
    #ai-avatar {
      width: 50px; height: 50px;
      background: var(--solar-gold);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 0 20px var(--solar-gold);
      animation: flarePulse 3s infinite;
    }

    @keyframes flarePulse {
      0% { box-shadow: 0 0 10px var(--solar-gold); }
      50% { box-shadow: 0 0 30px #FF6600; }
      100% { box-shadow: 0 0 10px var(--solar-gold); }
    }

    /* Initial Entrance Animation */
    .cat { animation: slideIn 0.8s backwards; }
    .cat:nth-child(1) { animation-delay: 0.1s; }
    .cat:nth-child(2) { animation-delay: 0.2s; }
    .cat:nth-child(3) { animation-delay: 0.3s; }
    .cat:nth-child(4) { animation-delay: 0.4s; }

    @keyframes slideIn {
      from { transform: translateX(-100px) scale(0.5); opacity: 0; }
      to { transform: translateX(0) scale(1); opacity: 1; }
    }

  </style>
</head>
<body>

  <div id="app">
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="nav-container">
        <div id="dock">
          <div class="cat active" onclick="handleFlareClick('earrings', this)">
              <div class="icon" style="font-size: 20px;">💎</div><span>Earrings</span>
          </div>
          <div class="cat" onclick="handleFlareClick('chains', this)">
              <div class="icon" style="font-size: 20px;">⛓️</div><span>Chains</span>
          </div>
          <div class="cat" onclick="handleFlareClick('rings', this)">
              <div class="icon" style="font-size: 20px;">💍</div><span>Rings</span>
          </div>
          <div class="cat" onclick="handleFlareClick('bangles', this)">
              <div class="icon" style="font-size: 20px;">✨</div><span>Bangles</span>
          </div>
        </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()">☀️</div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleFlareClick(type, element) {
        // UI Animation
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');

        // Logic call
        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleFlareClick('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
