<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Step UI Subfolder</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:65%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
}

#steps{
position:fixed;
top:65%;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
justify-content:center;
gap:10px;
align-items:center;
}

.step{
padding:6px 10px;
background:#222;
color:white;
border-radius:6px;
}

.step.active{
background:gold;
color:black;
}

#panel{
position:fixed;
bottom:0;
left:0;
width:100%;
height:35%;
background:#000;
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
box-sizing:border-box;
overflow:auto;
}

.item{
width:80px;
height:70px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
border:2px solid #444;
cursor:pointer;
}

.item:hover{
border:2px solid gold;
}

</style>
</head>
<body>


<div id="camera">
Camera / AR Screen
</div>


<div id="steps">

<div class="step" id="s1">Category</div>
<div class="step" id="s2">Sub</div>
<div class="step" id="s3">Product</div>
<div class="step" id="s4">Try</div>

</div>


<div id="panel"></div>


<script>


const data = {

earrings:["Stud","Drop","Hoop"],
rings:["Gold","Diamond","Silver"],
chains:["Short","Long","Bridal"],
bangles:["Simple","Bridal","Stone"]

};

const productCount = 15;

let currentCategory="";
let currentSub="";


function setStep(n){

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));

document.getElementById("s"+n).classList.add("active");

}


function showCategories(){

setStep(1);

const p=document.getElementById("panel");

p.innerHTML="";

Object.keys(data).forEach(cat=>{

let d=document.createElement("div");

d.className="item";

d.innerText=cat;

d.onclick=()=>{

currentCategory=cat;

showSub();

};

p.appendChild(d);

});

}


function showSub(){

setStep(2);

const p=document.getElementById("panel");

p.innerHTML="";

data[currentCategory].forEach(sub=>{

let d=document.createElement("div");

d.className="item";

d.innerText=sub;

d.onclick=()=>{

currentSub=sub;

showProducts();

};

p.appendChild(d);

});

}


function showProducts(){

setStep(3);

const p=document.getElementById("panel");

p.innerHTML="";

for(let i=1;i<=productCount;i++){

let d=document.createElement("div");

d.className="item";

d.innerText=currentSub+" "+i;

d.onclick=()=>{

document.getElementById("camera").innerText=
"Trying "+currentCategory+" "+currentSub+" "+i;

setStep(4);

};

p.appendChild(d);

}

}


showCategories();

</script>


</body>
</html>
