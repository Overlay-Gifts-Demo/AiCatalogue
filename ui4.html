<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Floating AR UI</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin: 0; background: black; font-family: 'Montserrat', sans-serif; overflow: hidden; }

    /* 1. AR BACKGROUND LAYER */
    #video-container { position: fixed; inset: 0; background: black; z-index: 0; }
    #webcam, #overlay { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    #webcam { transform: scaleX(-1); }

    /* 2. FLOATING CATEGORY ICONS */
    .icon {
      position: fixed; width: 70px; height: 70px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.5); color: #d4af37;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px); z-index: 10; transition: all 0.3s ease;
      font-weight: bold; font-size: 12px; text-transform: uppercase;
    }
    .icon.active { border: 2px solid #d4af37; background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
    
    /* Positions matching your UI request */
    #earrings-btn { top: 15%; left: 8%; }
    #chains-btn { top: 15%; right: 8%; }
    #rings-btn { bottom: 25%; left: 15%; }
    #bangles-btn { bottom: 25%; right: 15%; }

    /* 3. PRODUCT SLIDER (BOTTOM) */
    #jewelry-options {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5));
      display: flex; overflow-x: auto; gap: 10px; padding: 15px;
      box-sizing: border-box; z-index: 10; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    .thumb-btn {
      min-width: 70px; height: 70px; background: rgba(34,34,34,0.8);
      border-radius: 10px; border: 2px solid #444; object-fit: contain;
      cursor: pointer; transition: 0.2s; padding: 5px;
    }
    .thumb-btn:hover { border-color: #d4af37; transform: scale(1.05); }

    /* LOADING STATUS */
    #loading-status { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; z-index: 5; }
  </style>
</head>
<body>

  <div id="app">
    <div id="flash-overlay"></div>
    <div id="loading-status">Initializing AR...</div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="earrings-btn" class="icon active" onclick="selectJewelryType('earrings', this)">Ear</div>
    <div id="chains-btn" class="icon" onclick="selectJewelryType('chains', this)">Chain</div>
    <div id="rings-btn" class="icon" onclick="selectJewelryType('rings', this)">Ring</div>
    <div id="bangles-btn" class="icon" onclick="selectJewelryType('bangles', this)">Bang</div>

    <div id="jewelry-options" class="carousel-cards"></div>

    <div style="position:fixed; top:20px; right:20px; z-index:20; display:flex; gap:10px;">
        <button class="action-btn" onclick="takeSnapshot()">📷</button>
        <button class="action-btn" onclick="toggleStacking()" id="stacking-btn">∞</button>
    </div>

    <div id="ai-concierge-container">
        <div id="ai-bubble">Tap to activate Nila</div>
        <div id="ai-avatar" onclick="toggleConciergeMute()">
            <div class="avatar-ring"></div>
            <div class="avatar-face">🤖</div> 
        </div>
    </div>

    <div id="preview-modal" style="display:none;"><span class="close-preview" onclick="closePreview()">&times;</span><div class="preview-container"><img id="preview-image" src=""></div></div>
    <div id="toast-notification"></div>
  </div>

  <script src="core.js"></script>

  <script>
    /**
     * Overrides the selection to handle the floating icon "active" states
     */
    const originalSelectType = window.selectJewelryType;
    window.selectJewelryType = async function(type, element) {
        // Handle UI Active Class
        document.querySelectorAll(".icon").forEach(i => i.classList.remove("active"));
        if (element) {
            element.classList.add("active");
        } else {
            // If called via voice or init, find the correct button
            const btn = document.getElementById(`${type}-btn`);
            if (btn) btn.classList.add("active");
        }
        
        // Execute original engine logic (Camera switching, asset loading)
        if (typeof originalSelectType === 'function') {
            await originalSelectType(type);
        }
    };

    // Auto-start with Earrings
    window.addEventListener('load', () => {
        setTimeout(() => {
            window.selectJewelryType('earrings', document.getElementById('earrings-btn'));
        }, 1000);
    });
  </script>
</body>
</html>
