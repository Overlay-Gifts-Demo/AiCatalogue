<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Floating Panel AR</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { margin: 0; background: black; font-family: Arial, sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

    /* FULLSCREEN VIDEO CONTAINER */
    #video-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden; z-index: 0;
    }

    #webcam, #overlay, #remote-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; /* Use cover for fullscreen */
    }

    /* Reference image style uses cover for fullscreen, adjust if objects look stretched */
    #webcam { transform: scaleX(-1); }

    /* FLOATING SIDE NAVIGATION */
    #side-nav {
      position: absolute; top: 20px; left: 20px; /* Floating from corner */
      width: 110px; background: rgba(0,0,0,0.7); /* Translucent background */
      display: flex; flex-direction: column;
      padding: 15px 10px; gap: 10px; box-sizing: border-box; 
      z-index: 20; /* Ensure it floats over video */
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(5px); /* Reference glass effect */
    }

    .cat {
      background: rgba(255,255,255,0.1); color: white; padding: 12px 5px; text-align: center;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.3s;
      border: 1px solid transparent;
    }

    .cat:hover { border-color: rgba(255,255,255,0.3); }

    /* Target Reference Colors */
    .cat.active { background: #d4af37; color: black; font-weight: bold; }

    /* Bottom action buttons container */
    #side-nav-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

    .pill-btn {
        background: #222; border: 1px solid #444; color: white;
        border-radius: 50px; padding: 10px; font-size: 18px; cursor: pointer; transition: 0.3s;
    }
    .pill-btn:hover { background: #333; }

    /* PRODUCT SLIDER (BOTTOM) */
    #jewelry-options {
      position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
      background: rgba(0,0,0,0.8); display: flex; gap: 12px;
      overflow-x: auto; padding: 20px; box-sizing: border-box; z-index: 15;
      backdrop-filter: blur(10px); border-top: 1px solid #333;
    }

    /* Engine-generated thumbnail styling */
    .thumb-btn {
      min-width: 70px; height: 70px; background: #111; border-radius: 8px;
      object-fit: contain; border: 2px solid #333; cursor: pointer; transition: 0.2s;
    }
    .thumb-btn:hover { border-color: #d4af37; transform: scale(1.05); }

    #loading-status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #d4af37; z-index: 5; font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="flash-overlay"></div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
      <div id="loading-status">Connecting to AR engine...</div>

      <div id="side-nav">
        <div class="cat active" onclick="selectJewelryType('earrings', this)">Earrings</div>
        <div class="cat" onclick="selectJewelryType('chains', this)">Chains</div>
        <div class="cat" onclick="selectJewelryType('rings', this)">Rings</div>
        <div class="cat" onclick="selectJewelryType('bangles', this)">Bangles</div>
        
        <div id="side-nav-actions">
            <button class="pill-btn" onclick="takeSnapshot()">📷</button>
            <button class="pill-btn" onclick="toggleStacking()" id="stacking-btn">∞</button>
        </div>
      </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-bubble">Tap Nila</div>
        <div id="ai-avatar" onclick="toggleConciergeMute()">
            <div class="avatar-ring"></div>
            <div class="avatar-face">🤖</div> 
        </div>
    </div>

    <div id="preview-modal"><span class="close-preview" onclick="closePreview()">&times;</span><div class="preview-container"><img id="preview-image" src=""></div></div>
    <div id="toast-notification"></div>
  </div>

  <script src="core.js"></script>
</body>
</html>
